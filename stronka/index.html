<!DOCTYPE html>
<html lang="pl">

<link rel="preconnect" href="https://fonts.googleapis.com">

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
// ─── DESIGN TOKENS ─────────────────────────────
const A_COLORS = {
  bg: '#FAFAF7',
  ink: '#0A0A0A',
  ink70: '#3A3A3A',
  ink40: '#8A8A86',
  hair: '#E6E3DA',
  accent: '#2626E0',
  accentSoft: '#F0B8C4',
  accentInk: '#FFFFFF',
  paper: '#FFFFFF',
};

// ─── MOBILE HOOK + CONTEXT ────────────────────
const MobileCtx = React.createContext(false);
function useMobile() {
  const [m, setM] = React.useState(() => typeof window !== 'undefined' && window.innerWidth < 768);
  React.useEffect(() => {
    const h = () => setM(window.innerWidth < 768);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return m;
}

// ─── SHARED ────────────────────────────────────
const A_Section = ({ children, style, id, tight }) => {
  const isMobile = React.useContext(MobileCtx);
  return (
    <section id={id} style={{
      padding: isMobile ? (tight ? '48px 20px' : '72px 20px') : (tight ? '72px 56px' : '120px 56px'),
      borderTop: `1px solid ${A_COLORS.hair}`,
      ...style,
    }}>
      {children}
    </section>
  );
};

const A_Eyebrow = ({ num, children }) => {
  const isMobile = React.useContext(MobileCtx);
  return (
    <div style={{
      display: 'flex', alignItems: 'baseline', gap: 16,
      fontFamily: '"JetBrains Mono", monospace', fontSize: 12, letterSpacing: '0.12em',
      textTransform: 'uppercase', color: A_COLORS.ink70, marginBottom: isMobile ? 24 : 40,
    }}>
      <span style={{ color: A_COLORS.accent, fontWeight: 600 }}>{num}</span>
      <span style={{ flex: '0 0 auto' }}>{children}</span>
      <span style={{ flex: 1, height: 1, background: A_COLORS.hair, transform: 'translateY(-3px)' }} />
    </div>
  );
};

// ─── NAV ───────────────────────────────────────
function A_Nav({ scrolled, activePage }) {
  const isMobile = React.useContext(MobileCtx);
  const [menuOpen, setMenuOpen] = React.useState(false);
  const NAV = [['O nas','o-nas.html'],['Usługi','uslugi.html'],['Klienci','klienci.html'],['Kursy','kursy.html'],['Sebol','sebol.html'],['Kontakt','kontakt.html']];
  return (
    <>
      <header style={{
        position: 'sticky', top: 0, zIndex: 50,
        padding: isMobile ? (scrolled ? '12px 20px' : '18px 20px') : (scrolled ? '14px 56px' : '22px 56px'),
        background: scrolled || menuOpen ? 'rgba(250,250,247,0.95)' : 'transparent',
        backdropFilter: scrolled || menuOpen ? 'blur(16px)' : 'none',
        borderBottom: scrolled || menuOpen ? `1px solid ${A_COLORS.hair}` : '1px solid transparent',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        transition: 'all .25s ease',
      }}>
        <a href="index.html" style={{ display: 'flex', alignItems: 'center', textDecoration: 'none' }}>
          <img src="assets/patoagencja-wordmark-ink.png" alt="patoagencja" style={{ height: 20, display: 'block' }} />
        </a>
        {isMobile ? (
          <button onClick={() => setMenuOpen(o => !o)} style={{
            background: 'none', border: 'none', cursor: 'pointer', padding: 8,
            display: 'flex', flexDirection: 'column', gap: 5, alignItems: 'center',
          }}>

            <span style={{ display: 'block', width: 22, height: 2, background: A_COLORS.ink, transition: 'all .2s', opacity: menuOpen ? 0 : 1 }} />
            <span style={{ display: 'block', width: 22, height: 2, background: A_COLORS.ink, transition: 'all .2s', transform: menuOpen ? 'rotate(-45deg) translate(5px, -5px)' : 'none' }} />

                return (

}

// ─── HERO ──────────────────────────────────────
function A_Hero() {
  const isMobile = React.useContext(MobileCtx);
  const [time, setTime] = React.useState('');
  React.useEffect(() => {
    const tick = () => {
      const d = new Date();
      const opts = { timeZone: 'Europe/Warsaw', hour: '2-digit', minute: '2-digit', second: '2-digit' };
      setTime(d.toLocaleTimeString('pl-PL', opts));
    };
    tick();
    const t = setInterval(tick, 1000);
    return () => clearInterval(t);

  const [mouse, setMouse] = React.useState({ x: 0, y: 0 });

  React.useEffect(() => {
    const h = (e) => {
      if (!sectionRef.current) return;
      const r = sectionRef.current.getBoundingClientRect();
      setMouse({
        x: ((e.clientX - r.left) / r.width - 0.5) * 2,
        y: ((e.clientY - r.top) / r.height - 0.5) * 2,

    window.addEventListener('mousemove', h);

          50%  { transform: scale(1.14) translate(-1.5%, -1%); }
          100% { transform: scale(1.08) translate(0, 0); }

        @keyframes a-fog-drift {
          from { transform: translateX(-5%); }
          to { transform: translateX(5%); }
        }
        @keyframes a-flash {
          0%, 88%, 92%, 100% { opacity: 0; }
          90% { opacity: 0.35; }
        }
        @keyframes a-scanline {
          from { transform: translateY(-100%); }
          to { transform: translateY(100%); }
        }
        @keyframes a-hud-blink {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.25; }

          0% { transform: translate(0, 0); }
          25% { transform: translate(-5%, 3%); }

          75% { transform: translate(-2%, 5%); }
          100% { transform: translate(0, 0); }

            position: 'absolute',

            objectFit: 'cover', objectPosition: 'center',
            transform: `translate(${px(-12)}, ${py(-8)})`,

            imageRendering: 'auto',

      {/* SVG sharpen filter */}

        <defs>
          <filter id="a-sharpen">
            <feConvolveMatrix order="3" preserveAlpha="true"

          </filter>

      </svg>

      {/* Film grain overlay */}

        position: 'absolute', inset: 0, pointerEvents: 'none',

        backgroundSize: '220px 220px',

        position: 'absolute', inset: '-5%',
        background: 'radial-gradient(ellipse at 50% 40%, rgba(180, 220, 210, 0.18), transparent 55%)',

        animation: 'a-fog-drift 14s ease-in-out infinite alternate',
        pointerEvents: 'none',

      {/* Periodic neon pulse */}

        position: 'absolute', inset: 0,
        background: 'radial-gradient(ellipse at 62% 40%, rgba(0,229,255,0.45), transparent 55%)',

        position: 'absolute', inset: 0, overflow: 'hidden',

        display: isMobile ? 'none' : 'block',
      }}>
        <div>[CREW/01] TEAM_PATO · RUNTIME</div>
        <div style={{ color: '#00E5FF', animation: 'a-hud-blink 2s ease-in-out infinite' }}>
          ● LIVE · 3 BOTY AKTYWNE
        </div>
      </div>
      <div style={{
        position: 'absolute', bottom: 28, right: 56, zIndex: 4,
        fontFamily: '"JetBrains Mono", monospace', fontSize: 10,
        color: 'rgba(250,250,247,0.5)', letterSpacing: '0.15em', textTransform: 'uppercase',
        textShadow: '0 1px 4px rgba(0,0,0,0.6)',
        display: isMobile ? 'none' : 'block',
      }}>
        PATOAGENCJA · JUNGLE.MODE
      </div>

      {/* CONTENT — top status bar */}
      <div style={{ position: 'relative', zIndex: 5, padding: isMobile ? '16px 20px 0' : '32px 56px 0', color: '#FAFAF7' }}>
        <div style={{

        </div>
      </div>

      <div style={{
        position: 'relative', zIndex: 5, flex: 1,
        display: 'flex', alignItems: 'center',
        padding: isMobile ? '20px 20px 48px' : '40px 56px 80px', color: '#FAFAF7',
      }}>
        <div style={{ maxWidth: isMobile ? '100%' : '58%' }}>
          <h1 style={{
            fontSize: 'clamp(52px, 7.4vw, 128px)',

          <div style={{ marginTop: 44, display: 'grid', gap: 28 }}>

              textWrap: 'pretty', margin: 0, fontWeight: 400,

            </p>
            <div style={{ display: 'flex', alignItems: 'center', gap: 20, flexWrap: 'wrap' }}>
              <a href="#kontakt" style={{
                display: 'inline-flex', alignItems: 'center', gap: 14,
                background: A_COLORS.accent, color: '#fff', padding: '22px 32px',
                fontSize: 16, fontWeight: 600, textDecoration: 'none', borderRadius: 2,
                transition: 'transform .15s',
                boxShadow: '0 10px 30px rgba(255,74,28,0.35)',
              }}
              onMouseEnter={e => e.currentTarget.style.transform = 'translateY(-2px)'}
              onMouseLeave={e => e.currentTarget.style.transform = 'translateY(0)'}>
                Umów rozmowę
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 10h12M11 5l5 5-5 5"/></svg>
              </a>
              <span style={{ fontSize: 13, color: 'rgba(250,250,247,0.7)' }}>30 min · bez zobowiązań · odpowiadamy w 24h</span>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

// ─── METRICS ───────────────────────────────────
function A_Counter({ end, suffix = '', prefix = '' }) {
  const [v, setV] = React.useState(0);
  const ref = React.useRef(null);
  React.useEffect(() => {
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {
        const start = performance.now();
        const dur = 1400;
        const tick = (t) => {
          const p = Math.min(1, (t - start) / dur);
          const eased = 1 - Math.pow(1 - p, 3);
          setV(Math.round(end * eased));
          if (p < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
        io.disconnect();
      }
    }, { threshold: 0.3 });
    if (ref.current) io.observe(ref.current);
    return () => io.disconnect();
  }, [end]);
  return <span ref={ref}>{prefix}{v.toLocaleString('pl-PL')}{suffix}</span>;
}

    const e = {};
    if (!form.name.trim()) e.name = 'Podaj imię.';
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = 'Nieprawidłowy email.';

    return Object.keys(e).length === 0;

  const submit = (ev) => { ev.preventDefault(); if (validate()) setSent(true); };

            powiemy jak. Jeśli nie — też powiemy.
          </p>
          <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : '1fr 1fr', gap: 24, borderTop: '1px solid rgba(255,255,255,0.3)', paddingTop: 32 }}>
            <div>
              <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.1em', opacity: 0.7, marginBottom: 8 }}>Email</div>
              <a href="mailto:hej@patoagencja.com" style={{ fontSize: 18, color: '#fff', textDecoration: 'none', borderBottom: '1px solid rgba(255,255,255,0.5)' }}>hej@patoagencja.com</a>
            </div>
            <div>
              <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.1em', opacity: 0.7, marginBottom: 8 }}>Odpowiedź</div>
              <div style={{ fontSize: 18 }}>Do 24h roboczych</div>
            </div>
          </div>
        </div>

        {!sent ? (
          <form onSubmit={submit} style={{ background: '#fff', color: A_COLORS.ink, padding: 36, borderRadius: 2 }}>
            {[
              { k: 'name', label: 'Imię i firma', ph: 'Anna Kowalska, Belveo' },
              { k: 'email', label: 'Email', ph: 'anna@belveo.com', type: 'email' },
            ].map(({ k, label, ph, type }) => (
              <div key={k} style={{ marginBottom: 22 }}>
                <label style={{ display: 'block', fontSize: 11, fontFamily: '"JetBrains Mono", monospace', textTransform: 'uppercase', letterSpacing: '0.1em', color: A_COLORS.ink70, marginBottom: 8 }}>{label}</label>
                <input type={type || 'text'} value={form[k]} onChange={e => update(k, e.target.value)} placeholder={ph}
                  style={{ width: '100%', padding: '12px 0', border: 'none', borderBottom: `1px solid ${errors[k] ? '#D93838' : A_COLORS.hair}`,
                    background: 'transparent', fontSize: 17, outline: 'none', fontFamily: 'inherit', color: A_COLORS.ink, boxSizing: 'border-box' }} />
                {errors[k] && <div style={{ fontSize: 12, color: '#D93838', marginTop: 6 }}>{errors[k]}</div>}
              </div>
            ))}
            <div style={{ marginBottom: 22 }}>
              <label style={{ display: 'block', fontSize: 11, fontFamily: '"JetBrains Mono", monospace', textTransform: 'uppercase', letterSpacing: '0.1em', color: A_COLORS.ink70, marginBottom: 12 }}>Budżet miesięczny</label>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                {['< 10k', '10–30k', '30–80k', '80k+'].map(b => (
                  <button key={b} type="button" onClick={() => update('budget', b)}
                    style={{
                      padding: '8px 16px', fontSize: 13, fontWeight: 500, cursor: 'pointer',
                      border: `1px solid ${form.budget === b ? A_COLORS.ink : A_COLORS.hair}`,
                      background: form.budget === b ? A_COLORS.ink : '#fff',
                      color: form.budget === b ? '#fff' : A_COLORS.ink, borderRadius: 2,
                    }}>{b}</button>
                ))}
              </div>
            </div>
            <div style={{ marginBottom: 28 }}>
              <label style={{ display: 'block', fontSize: 11, fontFamily: '"JetBrains Mono", monospace', textTransform: 'uppercase', letterSpacing: '0.1em', color: A_COLORS.ink70, marginBottom: 8 }}>Z czym możemy pomóc</label>
              <textarea value={form.msg} onChange={e => update('msg', e.target.value)} placeholder="Krótko — co próbujesz osiągnąć i gdzie utknąłeś/aś."
                rows={4}
                style={{ width: '100%', padding: '12px 0', border: 'none', borderBottom: `1px solid ${errors.msg ? '#D93838' : A_COLORS.hair}`, background: 'transparent',
                  fontSize: 17, outline: 'none', fontFamily: 'inherit', color: A_COLORS.ink, resize: 'vertical', boxSizing: 'border-box' }} />
              {errors.msg && <div style={{ fontSize: 12, color: '#D93838', marginTop: 6 }}>{errors.msg}</div>}
            </div>
            <button type="submit" style={{
              width: '100%', padding: '18px', fontSize: 15, fontWeight: 600, cursor: 'pointer',
              background: A_COLORS.ink, color: '#fff', border: 'none', borderRadius: 2,
              display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 12,
              transition: 'background .15s',
            }}
            onMouseEnter={e => e.currentTarget.style.background = A_COLORS.accent}
            onMouseLeave={e => e.currentTarget.style.background = A_COLORS.ink}>
              Wyślij i umów rozmowę
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 8h10M9 3l5 5-5 5"/></svg>
            </button>
          </form>
        ) : (
          <div style={{ background: '#fff', color: A_COLORS.ink, padding: 48, borderRadius: 2, textAlign: 'center' }}>
            <div style={{ fontSize: 44, marginBottom: 16 }}>✓</div>
            <div style={{ fontSize: 22, fontWeight: 700, marginBottom: 12 }}>Mamy twoje zgłoszenie.</div>
            <p style={{ fontSize: 15, color: A_COLORS.ink70, margin: 0, textWrap: 'pretty' }}>Odezwiemy się maksymalnie w 24h roboczych. Jeśli to pilne — pisz wprost na <strong>hej@patoagencja.com</strong>.</p>
          </div>
        )}
      </div>
    </A_Section>
  );
}

// ─── PAGE ──────────────────────────────────────
function Page() {
  const isMobile = useMobile();
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const h = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', h); return () => window.removeEventListener('scroll', h);
  }, []);
  return (
    <MobileCtx.Provider value={isMobile}>
      <A_Nav scrolled={scrolled} activePage={null} />
      <A_Hero />
      <A_Trust />
      <A_Metrics />
      <A_Services />
      <A_Process />
      <A_AI />
      <A_Cases />
      <A_About />
      <A_CTA />
      <A_Footer />
    </MobileCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
