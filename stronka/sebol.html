              <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.1em', color: A_COLORS.ink40, marginBottom: 8, fontFamily: '"JetBrains Mono", monospace' }}>Email</div>
              <a href="mailto:hej@patoagencja.com" style={{ fontSize: 16, color: A_COLORS.ink, textDecoration: 'none', borderBottom: `1px solid ${A_COLORS.hair}` }}>hej@patoagencja.com</a>
            </div>
            <div>
              <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.1em', color: A_COLORS.ink40, marginBottom: 8, fontFamily: '"JetBrains Mono", monospace' }}>Odpowiedź</div>
              <div style={{ fontSize: 16, color: A_COLORS.ink }}>Do 24h roboczych</div>
            </div>
          </div>
        </div>

        {!sent ? (
          <div style={{ background: A_COLORS.ink, padding: 48, borderRadius: 2 }}>
            <div style={{ fontSize: 13, fontFamily: '"JetBrains Mono", monospace', color: 'rgba(255,255,255,0.5)', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 32 }}>Napisz do nas</div>
            <div style={{ marginBottom: 24 }}>
              <label style={{ display: 'block', fontSize: 11, fontFamily: '"JetBrains Mono", monospace', textTransform: 'uppercase', letterSpacing: '0.1em', color: 'rgba(255,255,255,0.5)', marginBottom: 10 }}>Twój email</label>
              <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="anna@firma.pl"
                style={{ width: '100%', padding: '12px 0', border: 'none', borderBottom: '1px solid rgba(255,255,255,0.2)', background: 'transparent', fontSize: 17, outline: 'none', fontFamily: 'inherit', color: '#fff', boxSizing: 'border-box' }} />
            </div>
            <button onClick={() => email && setSent(true)} style={{ width: '100%', padding: '18px', fontSize: 15, fontWeight: 600, cursor: 'pointer', background: A_COLORS.accent, color: '#fff', border: 'none', borderRadius: 2, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 12, transition: 'background .15s' }}
              onMouseEnter={e => e.currentTarget.style.background = '#1a1aff'}
              onMouseLeave={e => e.currentTarget.style.background = A_COLORS.accent}>
              Umów demo
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 8h10M9 3l5 5-5 5"/></svg>
            </button>
          </div>
        ) : (
          <div style={{ background: A_COLORS.ink, padding: 48, borderRadius: 2, textAlign: 'center' }}>
            <div style={{ fontSize: 44, marginBottom: 16, color: '#27c93f' }}>✓</div>
            <div style={{ fontSize: 22, fontWeight: 700, marginBottom: 12, color: '#fff' }}>Sebol zanotował.</div>
            <p style={{ fontSize: 15, color: 'rgba(255,255,255,0.6)', margin: 0 }}>Odezwiemy się w 24h. Jeśli pilne — pisz na <strong style={{ color: '#fff' }}>hej@patoagencja.com</strong>.</p>
          </div>
        )}
      </div>
    </section>
  );
}

function Page() {
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const h = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', h); return () => window.removeEventListener('scroll', h);
  }, []);
  return (<>
    <A_Nav scrolled={scrolled} />
    <SebolHero />
    <SebolProblem />
    <SebolHow />
    <SebolFeatures />
    <SebolTestimonial />
    <SebolCTA />
    <A_Footer />
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
