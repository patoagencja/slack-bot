<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<title>Kursy — Patoagencja</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #FAFAF7; }
  body { font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; -webkit-font-smoothing: antialiased; color: #0A0A0A; }
  #root { font-feature-settings: "ss01", "cv11"; }
  h1, h2, h3 { font-weight: 700; }
  em, i, [style*="italic"] { font-family: 'Instrument Serif', Georgia, serif !important; font-style: italic; font-weight: 400 !important; }
  ::-webkit-scrollbar { width: 10px; } ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 5px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const A_COLORS = {
  bg: '#FAFAF7', ink: '#0A0A0A', ink70: '#3A3A3A', ink40: '#8A8A86',
  hair: '#E6E3DA', accent: '#2626E0', accentSoft: '#F0B8C4', accentInk: '#FFFFFF', paper: '#FFFFFF',
};

// ─── MOBILE HOOK + CONTEXT ────────────────────
const MobileCtx = React.createContext(false);
function useMobile() {
  const [m, setM] = React.useState(() => typeof window !== 'undefined' && window.innerWidth < 768);
  React.useEffect(() => {
    const h = () => setM(window.innerWidth < 768);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return m;
}

const A_Section = ({ children, style, id, tight }) => {
  const isMobile = React.useContext(MobileCtx);
  return (
    <section id={id} style={{
      padding: isMobile ? (tight ? '48px 20px' : '72px 20px') : (tight ? '72px 56px' : '120px 56px'),
      borderTop: `1px solid ${A_COLORS.hair}`,
      ...style,
    }}>
      {children}
    </section>
  );
};

function A_Nav({ scrolled, activePage }) {
  const isMobile = React.useContext(MobileCtx);
  const [menuOpen, setMenuOpen] = React.useState(false);
  const NAV = [['O nas','o-nas.html'],['Usługi','uslugi.html'],['Klienci','klienci.html'],['Kursy','kursy.html'],['Sebol','sebol.html'],['Kontakt','kontakt.html']];
  return (
    <>
      <header style={{
        position: 'sticky', top: 0, zIndex: 50,
        padding: isMobile ? (scrolled ? '12px 20px' : '18px 20px') : (scrolled ? '14px 56px' : '22px 56px'),
        background: 'rgba(250,250,247,0.95)', backdropFilter: 'blur(16px)',
        borderBottom: `1px solid ${A_COLORS.hair}`,
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        transition: 'all .25s ease',
      }}>
        <a href="index.html" style={{ display: 'flex', alignItems: 'center', textDecoration: 'none' }}>
          <img src="assets/patoagencja-wordmark-ink.png" alt="patoagencja" style={{ height: 20, display: 'block' }} />
        </a>
        {isMobile ? (
          <button onClick={() => setMenuOpen(o => !o)} style={{
            background: 'none', border: 'none', cursor: 'pointer', padding: 8,
            display: 'flex', flexDirection: 'column', gap: 5, alignItems: 'center',
          }}>
            <span style={{ display: 'block', width: 22, height: 2, background: A_COLORS.ink, transition: 'all .2s', transform: menuOpen ? 'rotate(45deg) translate(5px, 5px)' : 'none' }} />
            <span style={{ display: 'block', width: 22, height: 2, background: A_COLORS.ink, transition: 'all .2s', opacity: menuOpen ? 0 : 1 }} />
            <span style={{ display: 'block', width: 22, height: 2, background: A_COLORS.ink, transition: 'all .2s', transform: menuOpen ? 'rotate(-45deg) translate(5px, -5px)' : 'none' }} />
          </button>
        ) : (
          <>
            <nav style={{ display: 'flex', gap: 40, fontSize: 14, fontWeight: 500 }}>
              {NAV.map(([l, href]) => {
                const isActive = activePage === l;
                return (
                  <a key={l} href={href} style={{ color: isActive ? A_COLORS.accent : A_COLORS.ink, textDecoration: 'none', position: 'relative' }}
                    onMouseEnter={e => { if (!isActive) e.currentTarget.querySelector('span').style.width = '100%'; }}
                    onMouseLeave={e => { if (!isActive) e.currentTarget.querySelector('span').style.width = '0%'; }}>
                    {l}
                    <span style={{ position: 'absolute', left: 0, bottom: -4, height: 1, width: isActive ? '100%' : '0%', background: A_COLORS.accent, transition: 'width .2s' }} />
                  </a>
                );
              })}
            </nav>
            <a href="kontakt.html" style={{ background: A_COLORS.ink, color: '#fff', padding: '10px 18px', fontSize: 13, fontWeight: 600, textDecoration: 'none', display: 'inline-flex', alignItems: 'center', gap: 8, borderRadius: 2, transition: 'background .15s' }}
              onMouseEnter={e => e.currentTarget.style.background = A_COLORS.accent}
              onMouseLeave={e => e.currentTarget.style.background = A_COLORS.ink}>
              Umów rozmowę
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M3 6h6M7 3l3 3-3 3"/></svg>
            </a>
          </>
        )}
      </header>
      {isMobile && menuOpen && (
        <div style={{
          position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, zIndex: 49,
          background: 'rgba(250,250,247,0.97)', backdropFilter: 'blur(16px)',
          display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center', gap: 0,
        }}>
          {NAV.map(([l, href]) => {
            const isActive = activePage === l;
            return (
              <a key={l} href={href} onClick={() => setMenuOpen(false)} style={{
                fontSize: 32, fontWeight: 700, letterSpacing: '-0.02em',
                color: isActive ? A_COLORS.accent : A_COLORS.ink,
                textDecoration: 'none', padding: '16px 0',
                borderBottom: `1px solid ${A_COLORS.hair}`, width: '80%', textAlign: 'center',
              }}>{l}</a>
            );
          })}
          <a href="kontakt.html" onClick={() => setMenuOpen(false)} style={{
            marginTop: 32, background: A_COLORS.ink, color: '#fff', padding: '16px 32px',
            fontSize: 16, fontWeight: 600, textDecoration: 'none', borderRadius: 2,
          }}>Umów rozmowę →</a>
        </div>
      )}
    </>
  );
}

function A_CTA() {
  const isMobile = React.useContext(MobileCtx);
  const [form, setForm] = React.useState({ name: '', email: '', budget: '', msg: '' });
  const [errors, setErrors] = React.useState({});
  const [sent, setSent] = React.useState(false);
  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = 'Podaj imię.';
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = 'Nieprawidłowy email.';
    if (!form.msg.trim() || form.msg.length < 10) e.msg = 'Napisz przynajmniej zdanie.';
    setErrors(e); return Object.keys(e).length === 0;
  };
  const submit = (ev) => { ev.preventDefault(); if (validate()) setSent(true); };
  const update = (k, v) => { setForm({ ...form, [k]: v }); if (errors[k]) setErrors({ ...errors, [k]: null }); };
  return (
    <A_Section id="kontakt" style={{ background: A_COLORS.accent, color: '#fff', borderTop: 'none' }}>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 16, fontFamily: '"JetBrains Mono", monospace', fontSize: 12, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.7)', marginBottom: 40 }}>
        <span>§</span><span>Umów rozmowę</span>
        <span style={{ flex: 1, height: 1, background: 'rgba(255,255,255,0.25)', transform: 'translateY(-3px)' }} />
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : '1.1fr 1fr', gap: isMobile ? 40 : 80, alignItems: 'start' }}>
        <div>
          <h2 style={{ fontSize: 'clamp(52px, 6.4vw, 104px)', fontWeight: 700, letterSpacing: '-0.04em', lineHeight: 0.94, margin: '0 0 40px' }}>
            Gadamy 30 minut.<br /><span style={{ fontStyle: 'italic', fontWeight: 500 }}>Bez zobowiązań,</span><br />bez prezentacji.
          </h2>
          <p style={{ fontSize: 19, lineHeight: 1.5, color: 'rgba(255,255,255,0.9)', maxWidth: 480, margin: '0 0 48px', textWrap: 'pretty' }}>
            Powiedz co próbujesz osiągnąć i z czym masz problem. Jeśli umiemy pomóc — powiemy jak. Jeśli nie — też powiemy.
          </p>
          <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : '1fr 1fr', gap: 24, borderTop: '1px solid rgba(255,255,255,0.3)', paddingTop: 32 }}>
            <div>
              <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.1em', opacity: 0.7, marginBottom: 8 }}>Email</div>
              <a href="mailto:hej@patoagencja.com" style={{ fontSize: 18, color: '#fff', textDecoration: 'none', borderBottom: '1px solid rgba(255,255,255,0.5)' }}>hej@patoagencja.com</a>
            </div>
            <div>
              <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.1em', opacity: 0.7, marginBottom: 8 }}>Odpowiedź</div>
              <div style={{ fontSize: 18 }}>Do 24h roboczych</div>
            </div>
          </div>
        </div>
        {!sent ? (
          <form onSubmit={submit} style={{ background: '#fff', color: A_COLORS.ink, padding: 36, borderRadius: 2 }}>
            {[{ k: 'name', label: 'Imię i firma', ph: 'Anna Kowalska, Belveo' }, { k: 'email', label: 'Email', ph: 'anna@belveo.com', type: 'email' }].map(({ k, label, ph, type }) => (
              <div key={k} style={{ marginBottom: 22 }}>
                <label style={{ display: 'block', fontSize: 11, fontFamily: '"JetBrains Mono", monospace', textTransform: 'uppercase', letterSpacing: '0.1em', color: A_COLORS.ink70, marginBottom: 8 }}>{label}</label>
                <input type={type || 'text'} value={form[k]} onChange={e => update(k, e.target.value)} placeholder={ph}
                  style={{ width: '100%', padding: '12px 0', border: 'none', borderBottom: `1px solid ${errors[k] ? '#D93838' : A_COLORS.hair}`, background: 'transparent', fontSize: 17, outline: 'none', fontFamily: 'inherit', color: A_COLORS.ink, boxSizing: 'border-box' }} />
                {errors[k] && <div style={{ fontSize: 12, color: '#D93838', marginTop: 6 }}>{errors[k]}</div>}
              </div>
            ))}
            <div style={{ marginBottom: 22 }}>
              <label style={{ display: 'block', fontSize: 11, fontFamily: '"JetBrains Mono", monospace', textTransform: 'uppercase', letterSpacing: '0.1em', color: A_COLORS.ink70, marginBottom: 12 }}>Budżet miesięczny</label>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                {['< 10k', '10–30k', '30–80k', '80k+'].map(b => (
                  <button key={b} type="button" onClick={() => update('budget', b)} style={{ padding: '8px 16px', fontSize: 13, fontWeight: 500, cursor: 'pointer', border: `1px solid ${form.budget === b ? A_COLORS.ink : A_COLORS.hair}`, background: form.budget === b ? A_COLORS.ink : '#fff', color: form.budget === b ? '#fff' : A_COLORS.ink, borderRadius: 2 }}>{b}</button>
                ))}
              </div>
            </div>
            <div style={{ marginBottom: 28 }}>
              <label style={{ display: 'block', fontSize: 11, fontFamily: '"JetBrains Mono", monospace', textTransform: 'uppercase', letterSpacing: '0.1em', color: A_COLORS.ink70, marginBottom: 8 }}>Z czym możemy pomóc</label>
              <textarea value={form.msg} onChange={e => update('msg', e.target.value)} placeholder="Krótko — co próbujesz osiągnąć i gdzie utknąłeś/aś." rows={4}
                style={{ width: '100%', padding: '12px 0', border: 'none', borderBottom: `1px solid ${errors.msg ? '#D93838' : A_COLORS.hair}`, background: 'transparent', fontSize: 17, outline: 'none', fontFamily: 'inherit', color: A_COLORS.ink, resize: 'vertical', boxSizing: 'border-box' }} />
              {errors.msg && <div style={{ fontSize: 12, color: '#D93838', marginTop: 6 }}>{errors.msg}</div>}
            </div>
            <button type="submit" style={{ width: '100%', padding: '18px', fontSize: 15, fontWeight: 600, cursor: 'pointer', background: A_COLORS.ink, color: '#fff', border: 'none', borderRadius: 2, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 12, transition: 'background .15s' }}
              onMouseEnter={e => e.currentTarget.style.background = A_COLORS.accent}
              onMouseLeave={e => e.currentTarget.style.background = A_COLORS.ink}>
              Wyślij i umów rozmowę
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 8h10M9 3l5 5-5 5"/></svg>
            </button>
          </form>
        ) : (
          <div style={{ background: '#fff', color: A_COLORS.ink, padding: 48, borderRadius: 2, textAlign: 'center' }}>
            <div style={{ fontSize: 44, marginBottom: 16 }}>✓</div>
            <div style={{ fontSize: 22, fontWeight: 700, marginBottom: 12 }}>Mamy twoje zgłoszenie.</div>
            <p style={{ fontSize: 15, color: A_COLORS.ink70, margin: 0 }}>Odezwiemy się maksymalnie w 24h roboczych.</p>
          </div>
        )}
      </div>
    </A_Section>
  );
}

function A_Footer() {
  const isMobile = React.useContext(MobileCtx);
  return (
    <footer style={{ padding: isMobile ? '48px 20px 32px' : '56px 56px 40px', background: A_COLORS.ink, color: '#fff' }}>
      <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : '1.5fr 1fr 1fr 1fr', gap: 40, marginBottom: 80 }}>
        <div>
          <img src="assets/patoagencja-wordmark-white.png" alt="patoagencja" style={{ height: 24, display: 'block', marginBottom: 20 }} />
          <p style={{ fontSize: 14, color: 'rgba(255,255,255,0.6)', lineHeight: 1.55, maxWidth: 360, margin: 0 }}>Mały zespół od performance marketingu, SEO, stron i AI. Warszawa, zdalnie dla reszty świata.</p>
        </div>
        {[
          ['Usługi', [['Performance','uslugi.html'],['SEO','uslugi.html'],['Strony','uslugi.html'],['AI i automatyzacje','uslugi.html'],['Strategia','uslugi.html']]],
          ['Firma', [['O nas','o-nas.html'],['Case studies','klienci.html'],['Kursy','kursy.html'],['Blog','#'],['Kontakt','kontakt.html']]],
          ['Kontakt', [['hej@patoagencja.com','mailto:hej@patoagencja.com'],['+48 500 000 000','tel:+48500000000'],['Warszawa, PL','#'],['@patoagencja','#']]],
        ].map(([t, items]) => (
          <div key={t}>
            <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.12em', color: 'rgba(255,255,255,0.4)', marginBottom: 20 }}>{t}</div>
            {items.map(([label, href]) => (
              <div key={label} style={{ fontSize: 14, padding: '5px 0' }}>
                <a href={href} style={{ color: 'rgba(255,255,255,0.85)', textDecoration: 'none' }}
                   onMouseEnter={e => e.currentTarget.style.color = '#fff'}
                   onMouseLeave={e => e.currentTarget.style.color = 'rgba(255,255,255,0.85)'}>{label}</a>
              </div>
            ))}
          </div>
        ))}
      </div>
      <div style={{ borderTop: '1px solid rgba(255,255,255,0.12)', paddingTop: 24, display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap', gap: 8, fontSize: 12, color: 'rgba(255,255,255,0.5)', fontFamily: '"JetBrains Mono", monospace' }}>
        <span>© 2026 Patoagencja sp. z o.o.</span>
        <span>Zrobione bez AI. Żartowaliśmy — z AI.</span>
      </div>
    </footer>
  );
}

// ─── KURSY ─────────────────────────────────────
function A_KursyContent() {
  const isMobile = React.useContext(MobileCtx);
  const courses = [
    { num: '01', t: 'Meta Ads od A do Z', len: '12h', lvl: 'ŚREDNI', price: '890', color: '#2626E0' },
    { num: '02', t: 'Google Ads Performance Max', len: '10h', lvl: 'ŚREDNI', price: '790', color: '#0A0A0A' },
    { num: '03', t: 'AI w pracy marketera', len: '8h', lvl: 'DLA KAŻDEGO', price: '690', color: '#F0B8C4' },
    { num: '04', t: 'Social media strategy', len: '6h', lvl: 'POCZĄTKUJĄCY', price: '490', color: '#2626E0' },
  ];

  return (
    <div style={{ background: A_COLORS.bg }}>
      {/* Ticker hero */}
      <section style={{ padding: isMobile ? '60px 0 32px' : '80px 0 40px', borderBottom: `1px solid ${A_COLORS.hair}`, overflow: 'hidden' }}>
        <div style={{ padding: isMobile ? '0 20px 40px' : '0 56px 60px' }}>
          <div style={{ fontFamily: '"JetBrains Mono", monospace', fontSize: 12, color: A_COLORS.ink40, letterSpacing: '0.12em', marginBottom: 24 }}>→ KURSY / KATALOG 2026</div>
          <h1 style={{ fontSize: 'clamp(56px, 10vw, 180px)', fontWeight: 700, letterSpacing: '-0.055em', lineHeight: 0.88, margin: 0, color: A_COLORS.ink }}>
            Wiedza,<br />którą <em style={{ fontWeight: 500, color: A_COLORS.accent }}>zastosujesz</em><br />jutro.
          </h1>
        </div>
        <div style={{ borderTop: `1px solid ${A_COLORS.ink}`, borderBottom: `1px solid ${A_COLORS.ink}`, padding: '18px 0', display: 'flex', gap: 56, whiteSpace: 'nowrap', animation: 'kurs-ticker 30s linear infinite', width: 'max-content' }}>
          {Array(2).fill(null).map((_, k) => (
            <React.Fragment key={k}>
              {['BEZ TEORII', '★', 'Z PRAKTYKI AGENCJI', '★', 'DLA MARKETERÓW', '★', 'AI W WORKFLOW', '★', 'POLSKI · ONLINE', '★'].map((x, i) => (
                <span key={i} style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.02em' }}>{x}</span>
              ))}
            </React.Fragment>
          ))}
        </div>
        <style>{`@keyframes kurs-ticker { to { transform: translateX(-50%); } }`}</style>
      </section>

      {/* 4 course cards */}
      <section style={{ padding: isMobile ? '24px 16px 60px' : '40px 40px 100px' }}>
        {courses.map((c, i) => {
          const dark = c.color === '#0A0A0A' || c.color === '#2626E0';
          return (
            <div key={i} style={{
              background: c.color, color: dark ? '#fff' : A_COLORS.ink,
              padding: isMobile ? '28px 20px' : '40px 56px',
              marginBottom: 16,
              minHeight: isMobile ? 'auto' : 280,
              display: 'grid',
              gridTemplateColumns: isMobile ? '1fr' : '140px 1fr 200px 180px',
              gap: isMobile ? 16 : 40,
              alignItems: 'center',
              position: 'relative', overflow: 'hidden', cursor: 'pointer', transition: 'transform .25s',
            }}
            onMouseEnter={!isMobile ? (e => { e.currentTarget.style.transform = 'translateX(-12px)'; }) : undefined}
            onMouseLeave={!isMobile ? (e => { e.currentTarget.style.transform = 'translateX(0)'; }) : undefined}>
              {!isMobile && <div style={{ fontSize: 120, fontWeight: 700, letterSpacing: '-0.05em', lineHeight: 0.8, fontVariantNumeric: 'tabular-nums' }}>{c.num}</div>}
              <div>
                <div style={{ fontFamily: '"JetBrains Mono", monospace', fontSize: 11, letterSpacing: '0.12em', opacity: 0.6, marginBottom: 8 }}>KURS {c.num}</div>
                <h3 style={{ fontSize: isMobile ? 28 : 48, fontWeight: 700, letterSpacing: '-0.035em', lineHeight: 1, margin: 0 }}>{c.t}</h3>
              </div>
              <div style={{ display: 'flex', flexDirection: isMobile ? 'row' : 'column', gap: isMobile ? 24 : 16, fontSize: 13, fontFamily: '"JetBrains Mono", monospace' }}>
                <div><span style={{ opacity: 0.5, display: 'block', marginBottom: 4 }}>DŁUGOŚĆ</span><span style={{ fontSize: 20, fontWeight: 600 }}>{c.len}</span></div>
                <div><span style={{ opacity: 0.5, display: 'block', marginBottom: 4 }}>POZIOM</span><span style={{ fontSize: 13, fontWeight: 600 }}>{c.lvl}</span></div>
              </div>
              <div style={{ textAlign: isMobile ? 'left' : 'right' }}>
                <div style={{ fontSize: isMobile ? 40 : 64, fontWeight: 700, letterSpacing: '-0.04em', lineHeight: 0.9 }}>{c.price}<span style={{ fontSize: 18, opacity: 0.5 }}>zł</span></div>
                <div style={{ fontSize: 13, marginTop: 12, opacity: 0.8, display: 'inline-flex', alignItems: 'center', gap: 8 }}>KUP KURS →</div>
              </div>
            </div>
          );
        })}
      </section>

      {/* Dla kogo */}
      <section style={{ padding: isMobile ? '60px 20px' : '100px 56px', background: A_COLORS.paper, borderTop: `1px solid ${A_COLORS.hair}`, borderBottom: `1px solid ${A_COLORS.hair}` }}>
        <h2 style={{ fontSize: 'clamp(36px, 5vw, 72px)', fontWeight: 700, letterSpacing: '-0.035em', lineHeight: 0.95, margin: '0 0 60px' }}>
          Dla marketerów,<br />którzy chcą <em style={{ fontWeight: 500, color: A_COLORS.accent }}>więcej niż podstawy.</em>
        </h2>
        <div style={{
          display: 'grid',
          gridTemplateColumns: isMobile ? '1fr' : '1fr 1fr',
          gap: 0, borderTop: `1px solid ${A_COLORS.ink}`,
        }}>
          {[
            { t: 'Specjaliści & marketerzy', d: 'Chcesz lepiej rozumieć platformy, optymalizację i nowe narzędzia AI. Chcesz działać sprawniej — nie powielać ruchów z kursów sprzed 5 lat.' },
            { t: 'Właściciele firm', d: 'Chcesz wiedzieć co działa i jak weryfikować pracę agencji. Rozumieć, za co płacisz — zamiast wierzyć na słowo w miesięczne raporty.' },
          ].map((x, i) => (
            <div key={i} style={{
              padding: isMobile ? '32px 0' : 48,
              borderRight: !isMobile && i === 0 ? `1px solid ${A_COLORS.hair}` : 'none',
              borderBottom: isMobile && i === 0 ? `1px solid ${A_COLORS.hair}` : 'none',
            }}>
              <div style={{ fontFamily: '"JetBrains Mono", monospace', fontSize: 13, color: A_COLORS.accent, letterSpacing: '0.1em', marginBottom: 16 }}>→ 0{i+1}</div>
              <h3 style={{ fontSize: 32, fontWeight: 700, letterSpacing: '-0.025em', margin: '0 0 20px' }}>{x.t}</h3>
              <p style={{ fontSize: 16, color: A_COLORS.ink70, lineHeight: 1.55, margin: 0, textWrap: 'pretty' }}>{x.d}</p>
            </div>
          ))}
        </div>
      </section>

      {/* Manifest edukacyjny */}
      <section style={{ padding: isMobile ? '72px 20px' : '120px 56px', background: A_COLORS.accent, color: '#fff', textAlign: 'center' }}>
        <div style={{ fontFamily: '"JetBrains Mono", monospace', fontSize: 12, letterSpacing: '0.15em', opacity: 0.7, marginBottom: 32 }}>★ DLACZEGO NASZE KURSY</div>
        <p style={{ fontSize: 'clamp(24px, 3.8vw, 56px)', fontWeight: 500, lineHeight: 1.15, letterSpacing: '-0.025em', margin: '0 auto', maxWidth: 1000, textWrap: 'balance' }}>
          Kursy tworzy <em style={{ color: A_COLORS.accentSoft, fontWeight: 500 }}>ten sam zespół</em>, który obsługuje klientów z 7-cyfrowymi budżetami. Uczymy tego, co sami robimy — <em>nie tego, co dobrze wygląda w programie.</em>
        </p>
      </section>
    </div>
  );
}

function Page() {
  const isMobile = useMobile();
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const h = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', h); return () => window.removeEventListener('scroll', h);
  }, []);
  return (
    <MobileCtx.Provider value={isMobile}>
      <A_Nav scrolled={scrolled} activePage="Kursy" />
      <A_KursyContent />
      <A_CTA />
      <A_Footer />
    </MobileCtx.Provider>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
</body>
</html>
